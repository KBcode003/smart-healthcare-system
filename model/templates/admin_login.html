<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Login</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
  <style>
    body { background-color: #f2f2f2; }
    .form-container { max-width: 400px; margin: 120px auto; background: teal; padding: 30px; border-radius: 10px; }
    label { color: #ddd; }
    h3 { color: white; text-align: center; margin-bottom: 20px; }
  </style>
</head>
<body>
  <div class="form-container">
    <h3>Admin Login</h3>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ 'danger' if category == 'error' else 'success' }}">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}
    <form method="POST">
      <div class="form-group">
        <label>Admin Password</label>
        <input type="password" class="form-control" name="password" placeholder="Enter admin password" required />
      </div>
      <button type="submit" class="btn btn-primary btn-block mt-3">Login</button>
    </form>
  </div>
</body>
</html>
